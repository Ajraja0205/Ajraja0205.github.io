<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansh Jain | GenAI Software Engineer</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --neon-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Hero Section */
        header {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
        }

        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            overflow: hidden;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { font-size: 1.2rem; color: var(--neon-blue); font-weight: 500; margin-bottom: 20px; }

        .contact-info { color: var(--text-dim); font-size: 0.9rem; }
        .contact-info a { color: var(--neon-blue); text-decoration: none; margin: 0 10px; }

        /* Content Sections */
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        section { margin-bottom: 60px; }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::after { content: ""; height: 1px; flex-grow: 1; background: #334155; }
